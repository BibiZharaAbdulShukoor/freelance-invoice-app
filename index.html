<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InvoiceHub - Freelance Invoice & Client Management</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="main-layouts">
      <!-- Let's define Sidebar Navigation -->
      <aside class="sidebars">
        <div class="mb-8">
          <div class="flx items-center gap-3 mb-2">
            <div
              style="
                width: 40px;
                height: 40px;
                background-color: var(--primary);
                border-radius: var(--radius-sm);
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-size: 1.25rem;
              "
            >
              📄
            </div>
            <div>
              <h2 style="margin: 0; font-size: 1.125rem">InvoiceHub</h2>
              <p
                style="
                  margin: 0;
                  font-size: 0.75rem;
                  color: var(--text-secondary);
                "
              >
                Freelance Manager
              </p>
            </div>
          </div>
        </div>

        <nav style="display: flex; flex-direction: column; gap: 0.5rem">
          <a href="#" class="sidebar-items active" data-page="dashboard">
            <span style="font-size: 1.25rem">📊</span>
            <span>Dashboard</span>
          </a>
          <a href="#" class="sidebar-items" data-page="clients">
            <span style="font-size: 1.25rem">👥</span>
            <span>Clients</span>
          </a>
          <a href="#" class="sidebar-items" data-page="invoices">
            <span style="font-size: 1.25rem">📋</span>
            <span>Invoices</span>
          </a>
        </nav>

        <div
          style="
            margin-top: auto;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
          "
        >
          Freelance Invoice & Client Management
        </div>
      </aside>

      <!-- Let's define Main Content -->
      <main class="main-contents" id="main-content">
        <!-- Let's define taht content will be loaded here -->
      </main>
    </div>

    <!-- Let's define Client Modal -->
    <div class="modal1" id="client-modal">
      <div class="modal-contents">
        <div class="modal-headers">
          <h2 class="modal-titles" id="client-modal-title">Add Client</h2>
          <button class="modal-closes" type="button">&times;</button>
        </div>
        <form id="client-form" class="modal-body1">
          <div class="form-groups">
            <label for="client-name">Client Name *</label>
            <input type="text" id="client-name" required />
          </div>
          <div class="form-groups">
            <label for="client-email">Email Address *</label>
            <input type="email" id="client-email" required />
          </div>
          <div class="form-groups">
            <label for="client-company">Company</label>
            <input type="text" id="client-company" />
          </div>
          <div class="form-groups">
            <label for="client-notes">Notes</label>
            <textarea id="client-notes"></textarea>
          </div>
        </form>
        <div class="modal-footers">
          <button
            type="button"
            class="button btn-secondary"
            onclick="closeModal('client-modal')"
          >
            Cancel
          </button>
          <button
            type="button"
            class="button btn-primary"
            onclick="
              document
                .getElementById('client-form')
                .dispatchEvent(new Event('submit'))
            "
          >
            Save Client
          </button>
        </div>
      </div>
    </div>

    <!-- Let's define Invoice Modal -->
    <div class="modal1" id="invoice-modal">
      <div class="modal-contents">
        <div class="modal-headers">
          <h2 class="modal-title" id="invoice-modal-title">Create Invoice</h2>
          <button class="modal-closes" type="button">&times;</button>
        </div>
        <form id="invoice-form" class="modal-body1">
          <div class="form-groups">
            <label for="invoice-client">Client *</label>
            <select id="invoice-client" required>
              <option value="">-- Select a Client --</option>
            </select>
          </div>
          <div class="form-groups">
            <label for="invoice-service">Service Title *</label>
            <input type="text" id="invoice-service" required />
          </div>
          <div class="form-groups">
            <label for="invoice-description">Description</label>
            <textarea id="invoice-description"></textarea>
          </div>
          <div class="form-groups">
            <label for="invoice-amount">Amount (USD) *</label>
            <input
              type="number"
              id="invoice-amount"
              step="0.01"
              min="0"
              required
            />
          </div>
          <div class="form-groups">
            <label for="invoice-date">Date *</label>
            <input type="date" id="invoice-date" required />
          </div>
        </form>
        <div class="modal-footers">
          <button
            type="button"
            class="button btn-secondary"
            onclick="closeModal('invoice-modal')"
          >
            Cancel
          </button>
          <button
            type="button"
            class="button btn-primary"
            onclick="
              document
                .getElementById('invoice-form')
                .dispatchEvent(new Event('submit'))
            "
          >
            Save Invoice
          </button>
        </div>
      </div>
    </div>

    <!-- Scripts - Load in order -->
    <script src="js/utils.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/clients.js"></script>
    <script src="js/invoices.js"></script>
  </body>
</html>
